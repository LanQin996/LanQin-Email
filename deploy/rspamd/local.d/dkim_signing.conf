enabled = true;

# LanQin API 固定生成 selector=lanqin。路径支持 $domain / $selector 模板。
path = "/var/lib/rspamd/dkim/$domain.$selector.key";
selector = "lanqin";
try_fallback = true;
use_domain = "header";
use_esld = false;
use_redis = false;

# Go API / Postfix 在容器内提交的邮件需要签名。
sign_authenticated = true;
sign_local = true;
sign_networks = "/etc/rspamd/local.d/sign_networks.map";

allow_username_mismatch = true;
allow_hdrfrom_mismatch_local = true;
allow_hdrfrom_mismatch_sign_networks = true;
allow_hdrfrom_multiple = true;
